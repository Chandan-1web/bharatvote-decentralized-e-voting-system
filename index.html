
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BharatVote | Decentralized Identity & Democracy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
          font-family: 'Plus Jakarta Sans', sans-serif; 
          scroll-behavior: smooth;
        }
        .mesh-gradient {
          background-color: #f8fafc;
          background-image: 
            radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 0%, rgba(249, 115, 22, 0.1) 0px, transparent 50%),
            radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%),
            radial-gradient(at 0% 100%, rgba(217, 70, 239, 0.1) 0px, transparent 50%);
        }
        .glass-card {
          background: rgba(255, 255, 255, 0.7);
          backdrop-filter: blur(12px);
          -webkit-backdrop-filter: blur(12px);
          border: 1px solid rgba(255, 255, 255, 0.3);
        }

        @keyframes float {
          0% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
          100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }

        @keyframes pulse-glow {
          0%, 100% { box-shadow: 0 0 20px rgba(79, 70, 229, 0.1); }
          50% { box-shadow: 0 0 40px rgba(79, 70, 229, 0.3); }
        }
        .animate-pulse-glow { animation: pulse-glow 3s infinite; }

        @keyframes slide-up {
          from { opacity: 0; transform: translateY(20px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-slide-up { animation: slide-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .step-transition {
          transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
        }
        
        /* Interactive Card States */
        .card-interaction {
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-interaction:hover {
          transform: translateY(-4px) scale(1.01);
          filter: brightness(1.02);
        }
        .card-interaction:active {
          transform: translateY(0) scale(0.98);
        }
    </style>
<script type="importmap">

</head>

</body>
</html>
